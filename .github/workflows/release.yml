name: Build and Release EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # - name: Prepare build directories
      #   shell: pwsh
      #   run: |
      #     New-Item -ItemType Directory -Force -Path "_generated" | Out-Null

      - name: Build with PyInstaller
        run: |
          pyinstaller ZundamonTTSRewardBot.spec

      - name: Copy settings folder into dist
        shell: pwsh
        run: |
          Copy-Item -Path "settings" -Destination "dist/settings" -Recurse -Force

      - name: Create _generated folder in dist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/_generated" | Out-Null
          New-Item -ItemType File -Force -Path "dist/_generated/.gitkeep" | Out-Null

      - name: Zip dist output
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outName = "ZundamonTTSRewardBot-$tag-windows.zip"
          Compress-Archive -Path dist\* -DestinationPath $outName
          echo "ASSET_NAME=$outName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --generate-notes

      - name: Upload asset to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ env.ASSET_NAME }}" --clobber
